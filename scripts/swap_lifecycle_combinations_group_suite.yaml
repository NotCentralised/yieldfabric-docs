# ════════════════════════════════════════════════════════════════════════════
#  SWAP LIFECYCLE COMBINATIONS — GROUP ACCOUNTS — roll × repurchase × forfeit
# ════════════════════════════════════════════════════════════════════════════
#  GROUP-ACCOUNT VARIANT of swap_lifecycle_combinations_suite.yaml: every party is
#  a GROUP, and all on-chain work is signed by the group's confidential account
#  (the owner acts AS the group via `user: { id, password, group: <Name> }`, and
#  swap counterparties are named by GROUP, e.g. `counterpart: Investor Group`).
#  REQUIRES setup.yaml seeded with the three per-party groups (Payer/Investor/Issuer
#  Group), each owned by its funded user + with a deployed account. The groups are
#  funded by the owner depositing ERC-20, instant-sending it to the group, and the
#  group accepting (see the funding block below).
#
#  Exercises the THREE terminal/lifecycle operations together within the same
#  rehypothecation chain (3 and 4 levels), in both happy and unhappy combinations:
#    • REPURCHASE  — borrower buys collateral back; cash cascades up the chain,
#                    only the OUTERMOST level's repurchase cash is freely claimable
#                    (record PAY-REPURCHASE-{swap}-0; for a rolled repo, {new_swap_id}).
#    • ROLL        — initiator/borrower extends to a new maturity + new lender
#                    (initiate_roll by the borrower; complete_roll by the NEW lender).
#                    Rolled repo is then repurchased/forfeited under its new_swap_id.
#    • FORFEIT     — on default after the deadline (expire_collateral); collateral
#                    forfeit-forwards up the chain to the end-lender.
#
#  PARTIES (each a GROUP, owned by the funded user that funds + acts for it):
#    Payer Group (payer@)  ·  Investor Group (investor@)  ·  Issuer Group (issuer@)
#  Only those three users are funded in the test env, so every chain reuses the
#  three groups circularly (roll-in lenders and end-lenders reuse a group not
#  already that swap's lender).
#
#  CHAIN-TIME RULE (cumulative — confirmed on run). advance_chain_time does
#  evm_increaseTime + evm_mine; the offset STACKS for the whole run, so chain time
#  = wall_clock + Σ(all advances so far). Two consequences per forfeit scenario:
#    (a) CREATE rejects unless deadline_offset > Σ_before + 120s (else createSwap
#        errors "deadline must be ≥120s in the future" — what broke U2 at Σ=13500).
#    (b) expire_collateral fires only once Σ_after (= Σ_before + this advance) clears
#        the swap's EXPIRY offset (NOT the deadline — what broke run-2's M3, whose
#        expiry +9000S sat above its Σ=8000). So deadlines + expiries must GROW to
#        stay ahead of the running Σ. Budget (Σ = cumulative advance after scenario):
#       M2: Σ_before 0      deadline +2500S  expiry +3200S  advance +3500  → Σ 3500
#       M3: Σ_before 3500   deadline +4500S  expiry +6000S  advance +10000 → Σ 13500
#       U2: Σ_before 13500  deadline +16000S expiry +17000S advance +10000 → Σ 23500
#  Repurchased/rolled levels use day-scale (+40d) expiries so the advances never
#  reach them. Non-forfeit scenarios (M1, U1, U3-U6) never advance.
#
#  ASSERTIONS: repurchase-cash delivery is balance-asserted EXACTLY against the GROUP's
#  confidential balance (each balance/assert runs `user: { group: X }`, so `private_balance`
#  reflects the GROUP, not the owner; `minus:`+`equals:` pins the precise repurchase amount).
#  Group funding (owner deposit → instant → group accept_all) is verified up-front with a
#  `gte` balance check per group (accept_all returns no message_id, so a silent zero-accept
#  would otherwise surface only as a misleading downstream swap failure). Forfeit cascade
#  lands are proven by the Issuer GROUP offering the underlying in a fresh create_swap.
#  NEGATIVES: U5/U6 pin `expect_error` to the RESOLVER reject string. U1/U3/U4/U2 deliberately
#  OMIT it — they fail via Solidity CUSTOM errors surfaced only as a 4-byte selector hex, not
#  the name, so a name substring would never match → false negative. Leave them
#  expect_failure-only. (Do NOT add the error name.)
# ════════════════════════════════════════════════════════════════════════════

commands:

  # ──── Fund each GROUP's confidential balance. A fresh group account holds no ERC-20, so it cannot
  # `deposit` directly (deposit pulls ERC-20 from the caller). Instead the OWNER (a funded user)
  # deposits ERC-20 into its own confidential balance, instant-sends it to the group BY NAME, and the
  # group accepts — exactly how datapolicy_group_suite / nc_acacia move assets into a group. AUD+USDC.
  # ── Payer Group ──
  - name: fund_payer_owner_aud
    type: deposit
    user: { id: payer@yieldfabric.com, password: payer_password }
    parameters: { asset_id: aud-token-asset, amount: 1000000000000000000000000, idempotency_key: lcg-payer-own-aud-$(date +%s) }
  - name: fund_payer_owner_usdc
    type: deposit
    user: { id: payer@yieldfabric.com, password: payer_password }
    parameters: { asset_id: usdc-asset, amount: 1000000000000000000000000, idempotency_key: lcg-payer-own-usdc-$(date +%s) }
  - name: fund_payer_group_aud_send
    type: instant
    user: { id: payer@yieldfabric.com, password: payer_password }
    parameters: { asset_id: aud-token-asset, amount: 1000000000000000000000000, destination_id: Payer Group, idempotency_key: lcg-payer-snd-aud-$(date +%s) }
  - name: fund_payer_group_usdc_send
    type: instant
    user: { id: payer@yieldfabric.com, password: payer_password }
    parameters: { asset_id: usdc-asset, amount: 1000000000000000000000000, destination_id: Payer Group, idempotency_key: lcg-payer-snd-usdc-$(date +%s) }
  - name: fund_payer_group_aud_accept
    type: accept_all
    user: { id: payer@yieldfabric.com, password: payer_password, group: Payer Group }
    parameters: { denomination: aud-token-asset, wait: true }
  - name: fund_payer_group_usdc_accept
    type: accept_all
    user: { id: payer@yieldfabric.com, password: payer_password, group: Payer Group }
    parameters: { denomination: usdc-asset, wait: true }
  # ── Investor Group ──
  - name: fund_investor_owner_aud
    type: deposit
    user: { id: investor@yieldfabric.com, password: investor_password }
    parameters: { asset_id: aud-token-asset, amount: 1000000000000000000000000, idempotency_key: lcg-inv-own-aud-$(date +%s) }
  - name: fund_investor_owner_usdc
    type: deposit
    user: { id: investor@yieldfabric.com, password: investor_password }
    parameters: { asset_id: usdc-asset, amount: 1000000000000000000000000, idempotency_key: lcg-inv-own-usdc-$(date +%s) }
  - name: fund_investor_group_aud_send
    type: instant
    user: { id: investor@yieldfabric.com, password: investor_password }
    parameters: { asset_id: aud-token-asset, amount: 1000000000000000000000000, destination_id: Investor Group, idempotency_key: lcg-inv-snd-aud-$(date +%s) }
  - name: fund_investor_group_usdc_send
    type: instant
    user: { id: investor@yieldfabric.com, password: investor_password }
    parameters: { asset_id: usdc-asset, amount: 1000000000000000000000000, destination_id: Investor Group, idempotency_key: lcg-inv-snd-usdc-$(date +%s) }
  - name: fund_investor_group_aud_accept
    type: accept_all
    user: { id: investor@yieldfabric.com, password: investor_password, group: Investor Group }
    parameters: { denomination: aud-token-asset, wait: true }
  - name: fund_investor_group_usdc_accept
    type: accept_all
    user: { id: investor@yieldfabric.com, password: investor_password, group: Investor Group }
    parameters: { denomination: usdc-asset, wait: true }
  # ── Issuer Group ──
  - name: fund_issuer_owner_aud
    type: deposit
    user: { id: issuer@yieldfabric.com, password: issuer_password }
    parameters: { asset_id: aud-token-asset, amount: 1000000000000000000000000, idempotency_key: lcg-iss-own-aud-$(date +%s) }
  - name: fund_issuer_owner_usdc
    type: deposit
    user: { id: issuer@yieldfabric.com, password: issuer_password }
    parameters: { asset_id: usdc-asset, amount: 1000000000000000000000000, idempotency_key: lcg-iss-own-usdc-$(date +%s) }
  - name: fund_issuer_group_aud_send
    type: instant
    user: { id: issuer@yieldfabric.com, password: issuer_password }
    parameters: { asset_id: aud-token-asset, amount: 1000000000000000000000000, destination_id: Issuer Group, idempotency_key: lcg-iss-snd-aud-$(date +%s) }
  - name: fund_issuer_group_usdc_send
    type: instant
    user: { id: issuer@yieldfabric.com, password: issuer_password }
    parameters: { asset_id: usdc-asset, amount: 1000000000000000000000000, destination_id: Issuer Group, idempotency_key: lcg-iss-snd-usdc-$(date +%s) }
  - name: fund_issuer_group_aud_accept
    type: accept_all
    user: { id: issuer@yieldfabric.com, password: issuer_password, group: Issuer Group }
    parameters: { denomination: aud-token-asset, wait: true }
  - name: fund_issuer_group_usdc_accept
    type: accept_all
    user: { id: issuer@yieldfabric.com, password: issuer_password, group: Issuer Group }
    parameters: { denomination: usdc-asset, wait: true }

  # FUNDING VERIFICATION (audit #4): accept_all returns bulk counts with NO message_id, so a silent
  # zero-accept would underfund a group and surface only as a misleading downstream swap failure far away.
  # Assert each group's confidential AUD balance now covers the 1,000,000e18 just instant-sent. gte (not
  # equals) is re-run-safe: the groups persist (setup.yaml) and each run's fresh-keyed funding accumulates,
  # so the balance is >= this run's send — while a wholesale accept failure (balance below the send) trips it.
  - name: payer_group_aud_funded
    type: balance
    user: { id: payer@yieldfabric.com, password: payer_password, group: Payer Group }
    parameters: { asset_id: aud-token-asset }
  - name: assert_payer_group_funded
    type: assert
    user: { id: payer@yieldfabric.com, password: payer_password, group: Payer Group }
    parameters: { actual: "$payer_group_aud_funded.private_balance", gte: "1000000000000000000000000" }
  - name: investor_group_aud_funded
    type: balance
    user: { id: investor@yieldfabric.com, password: investor_password, group: Investor Group }
    parameters: { asset_id: aud-token-asset }
  - name: assert_investor_group_funded
    type: assert
    user: { id: investor@yieldfabric.com, password: investor_password, group: Investor Group }
    parameters: { actual: "$investor_group_aud_funded.private_balance", gte: "1000000000000000000000000" }
  - name: issuer_group_aud_funded
    type: balance
    user: { id: issuer@yieldfabric.com, password: issuer_password, group: Issuer Group }
    parameters: { asset_id: aud-token-asset }
  - name: assert_issuer_group_funded
    type: assert
    user: { id: issuer@yieldfabric.com, password: issuer_password, group: Issuer Group }
    parameters: { actual: "$issuer_group_aud_funded.private_balance", gte: "1000000000000000000000000" }

  # ════════ M1 — ROLL THE OUTER, THEN FULL REPURCHASE-UNWIND (3 levels, happy) ════════
  # repo_1 payer⇄investor → repo_2 investor⇄issuer → repo_3 issuer⇄payer.
  # issuer rolls the OUTER repo_3 to a new lender (investor); then the whole chain
  # unwinds by repurchase, outermost-in. Proves roll + repurchase compose: the
  # rolled-outer's repurchase cash reaches its NEW lender, and the underlying
  # round-trips back to payer. No forfeiture ⇒ long deadlines, no chain jump.
  - name: m1_underlying
    type: create_obligation
    user: { id: payer@yieldfabric.com, password: payer_password, group: Payer Group }
    parameters: { idempotency_key: m1-under-$(date +%s), counterpart: Payer Group, expiry: $(date -u -v+90d +%Y-%m-%dT%H:%M:%SZ), contract_id: na_m1_underlying, data: { name: "M1 underlying", description: "roll+repurchase unwind" } }

  - name: m1_repo1_create
    type: create_swap
    user: { id: payer@yieldfabric.com, password: payer_password, group: Payer Group }
    parameters:
      swap_id: "860001"
      idempotency_key: m1-r1-create-$(date +%s)
      deadline: $(date -u -v+40d +%Y-%m-%dT%H:%M:%SZ)
      expiry:   $(date -u -v+80d +%Y-%m-%dT%H:%M:%SZ)
      initiator:
        collateral_obligation_ids: [na_m1_underlying]
        repurchase_payments: { denomination: usdc-asset, amount: 1050000000000000000000, payments: [{ id: m1-r1-repurch-1 }] }
      counterparty:
        id: Investor Group
        expected_payments: { denomination: aud-token-asset, amount: 1000000000000000000000, payments: [{ id: m1-r1-cash-1 }] }
  - name: m1_repo1_complete
    type: complete_swap
    user: { id: investor@yieldfabric.com, password: investor_password, group: Investor Group }
    parameters: { swap_id: "860001", idempotency_key: m1-r1-complete-$(date +%s) }

  - name: m1_repo2_create
    type: create_swap
    user: { id: investor@yieldfabric.com, password: investor_password, group: Investor Group }
    parameters:
      swap_id: "860002"
      idempotency_key: m1-r2-create-$(date +%s)
      deadline: $(date -u -v+40d +%Y-%m-%dT%H:%M:%SZ)
      expiry:   $(date -u -v+80d +%Y-%m-%dT%H:%M:%SZ)
      initiator:
        collateral_contract_references: [{ composed_contract_id: COMPOSED-CONTRACT-REPO-SWAP-860001 }]
        repurchase_payments: { denomination: aud-token-asset, amount: 1020000000000000000000, payments: [{ id: m1-r2-repurch-1 }] }
      counterparty:
        id: Issuer Group
        expected_payments: { denomination: aud-token-asset, amount: 1000000000000000000000, payments: [{ id: m1-r2-cash-1 }] }
  - name: m1_repo2_complete
    type: complete_swap
    user: { id: issuer@yieldfabric.com, password: issuer_password, group: Issuer Group }
    parameters: { swap_id: "860002", idempotency_key: m1-r2-complete-$(date +%s) }

  - name: m1_repo3_create
    type: create_swap
    user: { id: issuer@yieldfabric.com, password: issuer_password, group: Issuer Group }
    parameters:
      swap_id: "860003"
      idempotency_key: m1-r3-create-$(date +%s)
      deadline: $(date -u -v+40d +%Y-%m-%dT%H:%M:%SZ)
      expiry:   $(date -u -v+80d +%Y-%m-%dT%H:%M:%SZ)
      initiator:
        collateral_contract_references: [{ composed_contract_id: COMPOSED-CONTRACT-REPO-SWAP-860002 }]
        repurchase_payments: { denomination: aud-token-asset, amount: 1010000000000000000000, payments: [{ id: m1-r3-repurch-1 }] }
      counterparty:
        id: Payer Group
        expected_payments: { denomination: aud-token-asset, amount: 1000000000000000000000, payments: [{ id: m1-r3-cash-1 }] }
  - name: m1_repo3_complete
    type: complete_swap
    user: { id: payer@yieldfabric.com, password: payer_password, group: Payer Group }
    parameters: { swap_id: "860003", idempotency_key: m1-r3-complete-$(date +%s) }

  # ROLL the OUTER repo_3: issuer (borrower) initiates, investor becomes the new lender; payer (old
  # lender) is bought out. Cont_2 migrates to the rolled swap 860013.
  - name: m1_repo3_roll_initiate
    type: initiate_roll
    user: { id: issuer@yieldfabric.com, password: issuer_password, group: Issuer Group }
    parameters:
      old_swap_id: "860003"
      new_swap_id: "860013"
      new_counterparty: Investor Group
      new_deadline: $(date -u -v+40d +%Y-%m-%dT%H:%M:%SZ)
      new_expiry:   $(date -u -v+80d +%Y-%m-%dT%H:%M:%SZ)
      idempotency_key: m1-r3-roll-$(date +%s)
  - name: m1_repo3_roll_complete
    type: complete_roll
    user: { id: investor@yieldfabric.com, password: investor_password, group: Investor Group }
    parameters: { new_swap_id: "860013", idempotency_key: m1-r3-roll-complete-$(date +%s) }

  # UNWIND outermost-in. (1) issuer repurchases the rolled outer 860013 → investor (NEW lender) is paid.
  - name: m1_investor_aud_before
    type: balance
    user: { id: investor@yieldfabric.com, password: investor_password, group: Investor Group }
    parameters: { asset_id: aud-token-asset }
  - name: m1_repo3_repurchase
    type: repurchase_swap
    user: { id: issuer@yieldfabric.com, password: issuer_password, group: Issuer Group }
    parameters: { swap_id: "860013", idempotency_key: m1-r3-repurch-$(date +%s) }

  # #71 FIXED: the rolled swap's repurchase now delivers a claimable record to the new lender (Investor
  # Group) via the roll's stored prefund id_hashes; the group claims it and its balance rises.
  # (Requires the rebuilt payments service.)
  - name: m1_rolled_repurchase_claim
    type: accept
    user: { id: investor@yieldfabric.com, password: investor_password, group: Investor Group }
    parameters: { payment_id: PAY-REPURCHASE-860013-0, idempotency_key: m1-r3-claim-$(date +%s) }
  - name: m1_investor_aud_after
    type: balance
    user: { id: investor@yieldfabric.com, password: investor_password, group: Investor Group }
    parameters: { asset_id: aud-token-asset }
  - name: m1_assert_rolled_repurchase_received
    type: assert
    user: { id: investor@yieldfabric.com, password: investor_password, group: Investor Group }
    parameters:
      # EXACT (#71 guard, GROUP recipient): rolled 860013 = repo_3 terms = 1010 AUD to Investor Group.
      actual: "$m1_investor_aud_after.private_balance"
      minus: "$m1_investor_aud_before.private_balance"
      equals: "1010000000000000000000"

  # (2) investor repurchases repo_2 → issuer paid;  (3) payer repurchases repo_1 → investor paid.
  - name: m1_repo2_repurchase
    type: repurchase_swap
    user: { id: investor@yieldfabric.com, password: investor_password, group: Investor Group }
    parameters: { swap_id: "860002", idempotency_key: m1-r2-repurch-$(date +%s) }
  - name: m1_repo1_repurchase
    type: repurchase_swap
    user: { id: payer@yieldfabric.com, password: payer_password, group: Payer Group }
    parameters: { swap_id: "860001", idempotency_key: m1-r1-repurch-$(date +%s) }

  # PROOF: the underlying round-tripped back to payer (create_swap offering it succeeds only if owned).
  - name: m1_verify_payer_owns
    type: create_swap
    user: { id: payer@yieldfabric.com, password: payer_password, group: Payer Group }
    parameters:
      swap_id: "860099"
      idempotency_key: m1-verify-$(date +%s)
      initiator: { obligation_ids: [na_m1_underlying] }
      counterparty:
        id: Investor Group
        expected_payments: { denomination: aud-token-asset, amount: 1000000000000000000000, payments: [{ id: m1-verify-want-1 }] }
      deadline: $(date -u -v+30d +%Y-%m-%dT%H:%M:%SZ)


  # ════════ U1 — FORFEIT BEFORE DEADLINE → REJECT (unhappy) ════════
  # A standalone repo with a far-future deadline cannot be forfeited; expire_collateral must reject.
  - name: u1_underlying
    type: create_obligation
    user: { id: payer@yieldfabric.com, password: payer_password, group: Payer Group }
    parameters: { idempotency_key: u1-under-$(date +%s), counterpart: Payer Group, expiry: $(date -u -v+90d +%Y-%m-%dT%H:%M:%SZ), contract_id: na_u1_underlying, data: { name: "U1 underlying", description: "forfeit-before-deadline" } }
  - name: u1_create
    type: create_swap
    user: { id: payer@yieldfabric.com, password: payer_password, group: Payer Group }
    parameters:
      swap_id: "861001"
      idempotency_key: u1-create-$(date +%s)
      deadline: $(date -u -v+40d +%Y-%m-%dT%H:%M:%SZ)
      expiry:   $(date -u -v+80d +%Y-%m-%dT%H:%M:%SZ)
      initiator:
        collateral_obligation_ids: [na_u1_underlying]
        repurchase_payments: { denomination: usdc-asset, amount: 1050000000000000000000, payments: [{ id: u1-repurch-1 }] }
      counterparty:
        id: Investor Group
        expected_payments: { denomination: aud-token-asset, amount: 1000000000000000000000, payments: [{ id: u1-cash-1 }] }
  - name: u1_complete
    type: complete_swap
    user: { id: investor@yieldfabric.com, password: investor_password, group: Investor Group }
    parameters: { swap_id: "861001", idempotency_key: u1-complete-$(date +%s) }
  - name: u1_forfeit_before_deadline_fails
    type: expire_collateral
    user: { id: investor@yieldfabric.com, password: investor_password, group: Investor Group }
    parameters: { swap_id: "861001", idempotency_key: u1-forfeit-$(date +%s), expect_failure: true }


  # ════════ U5 — ROLL BY THE WRONG PARTY (counterparty) → REJECT (unhappy) ════════
  # Only the initiator/borrower may initiate a roll; the counterparty/lender attempting it must fail.
  - name: u5_underlying
    type: create_obligation
    user: { id: payer@yieldfabric.com, password: payer_password, group: Payer Group }
    parameters: { idempotency_key: u5-under-$(date +%s), counterpart: Payer Group, expiry: $(date -u -v+90d +%Y-%m-%dT%H:%M:%SZ), contract_id: na_u5_underlying, data: { name: "U5 underlying", description: "roll-by-counterparty" } }
  - name: u5_create
    type: create_swap
    user: { id: payer@yieldfabric.com, password: payer_password, group: Payer Group }
    parameters:
      swap_id: "861002"
      idempotency_key: u5-create-$(date +%s)
      deadline: $(date -u -v+40d +%Y-%m-%dT%H:%M:%SZ)
      expiry:   $(date -u -v+80d +%Y-%m-%dT%H:%M:%SZ)
      initiator:
        collateral_obligation_ids: [na_u5_underlying]
        repurchase_payments: { denomination: usdc-asset, amount: 1050000000000000000000, payments: [{ id: u5-repurch-1 }] }
      counterparty:
        id: Investor Group
        expected_payments: { denomination: aud-token-asset, amount: 1000000000000000000000, payments: [{ id: u5-cash-1 }] }
  - name: u5_complete
    type: complete_swap
    user: { id: investor@yieldfabric.com, password: investor_password, group: Investor Group }
    parameters: { swap_id: "861002", idempotency_key: u5-complete-$(date +%s) }
  - name: u5_roll_by_counterparty_fails
    type: initiate_roll
    user: { id: investor@yieldfabric.com, password: investor_password, group: Investor Group }   # lender, not the borrower
    parameters:
      old_swap_id: "861002"
      new_swap_id: "861012"
      new_counterparty: Issuer Group
      new_deadline: $(date -u -v+40d +%Y-%m-%dT%H:%M:%SZ)
      new_expiry:   $(date -u -v+80d +%Y-%m-%dT%H:%M:%SZ)
      idempotency_key: u5-roll-$(date +%s)
      expect_failure: true
      expect_error: "can initiate a roll"   # resolver string (repo.rs:243) — fires before the chain check


  # ════════ U6 — COMPLETE_ROLL BY THE WRONG PARTY (initiator) → REJECT (unhappy) ════════
  # Only the NEW counterparty/lender may complete a roll; the initiator attempting it must fail.
  - name: u6_underlying
    type: create_obligation
    user: { id: payer@yieldfabric.com, password: payer_password, group: Payer Group }
    parameters: { idempotency_key: u6-under-$(date +%s), counterpart: Payer Group, expiry: $(date -u -v+90d +%Y-%m-%dT%H:%M:%SZ), contract_id: na_u6_underlying, data: { name: "U6 underlying", description: "complete-roll-by-initiator" } }
  - name: u6_create
    type: create_swap
    user: { id: payer@yieldfabric.com, password: payer_password, group: Payer Group }
    parameters:
      swap_id: "861003"
      idempotency_key: u6-create-$(date +%s)
      deadline: $(date -u -v+40d +%Y-%m-%dT%H:%M:%SZ)
      expiry:   $(date -u -v+80d +%Y-%m-%dT%H:%M:%SZ)
      initiator:
        collateral_obligation_ids: [na_u6_underlying]
        repurchase_payments: { denomination: usdc-asset, amount: 1050000000000000000000, payments: [{ id: u6-repurch-1 }] }
      counterparty:
        id: Investor Group
        expected_payments: { denomination: aud-token-asset, amount: 1000000000000000000000, payments: [{ id: u6-cash-1 }] }
  - name: u6_complete
    type: complete_swap
    user: { id: investor@yieldfabric.com, password: investor_password, group: Investor Group }
    parameters: { swap_id: "861003", idempotency_key: u6-complete-$(date +%s) }
  - name: u6_roll_initiate
    type: initiate_roll
    user: { id: payer@yieldfabric.com, password: payer_password, group: Payer Group }
    parameters:
      old_swap_id: "861003"
      new_swap_id: "861013"
      new_counterparty: Issuer Group
      new_deadline: $(date -u -v+40d +%Y-%m-%dT%H:%M:%SZ)
      new_expiry:   $(date -u -v+80d +%Y-%m-%dT%H:%M:%SZ)
      idempotency_key: u6-roll-$(date +%s)
  - name: u6_complete_roll_by_initiator_fails
    type: complete_roll
    user: { id: payer@yieldfabric.com, password: payer_password, group: Payer Group }   # initiator, not the NEW lender
    # resolver string (repo.rs:397) — the caller isn't the new counterparty entity; fires before the chain check.
    parameters: { new_swap_id: "861013", idempotency_key: u6-roll-complete-$(date +%s), expect_failure: true, expect_error: "Access denied: wallet" }


  # ════════ U3 — ROLL AFTER REPURCHASE (terminal swap) → REJECT (unhappy) ════════
  # Once a repo is repurchased (COMPLETED), it cannot be rolled.
  - name: u3_underlying
    type: create_obligation
    user: { id: payer@yieldfabric.com, password: payer_password, group: Payer Group }
    parameters: { idempotency_key: u3-under-$(date +%s), counterpart: Payer Group, expiry: $(date -u -v+90d +%Y-%m-%dT%H:%M:%SZ), contract_id: na_u3_underlying, data: { name: "U3 underlying", description: "roll-after-repurchase" } }
  - name: u3_create
    type: create_swap
    user: { id: payer@yieldfabric.com, password: payer_password, group: Payer Group }
    parameters:
      swap_id: "861004"
      idempotency_key: u3-create-$(date +%s)
      deadline: $(date -u -v+40d +%Y-%m-%dT%H:%M:%SZ)
      expiry:   $(date -u -v+80d +%Y-%m-%dT%H:%M:%SZ)
      initiator:
        collateral_obligation_ids: [na_u3_underlying]
        repurchase_payments: { denomination: usdc-asset, amount: 1050000000000000000000, payments: [{ id: u3-repurch-1 }] }
      counterparty:
        id: Investor Group
        expected_payments: { denomination: aud-token-asset, amount: 1000000000000000000000, payments: [{ id: u3-cash-1 }] }
  - name: u3_complete
    type: complete_swap
    user: { id: investor@yieldfabric.com, password: investor_password, group: Investor Group }
    parameters: { swap_id: "861004", idempotency_key: u3-complete-$(date +%s) }
  - name: u3_repurchase
    type: repurchase_swap
    user: { id: payer@yieldfabric.com, password: payer_password, group: Payer Group }
    parameters: { swap_id: "861004", idempotency_key: u3-repurch-$(date +%s) }
  - name: u3_roll_after_repurchase_fails
    type: initiate_roll
    user: { id: payer@yieldfabric.com, password: payer_password, group: Payer Group }
    parameters:
      old_swap_id: "861004"
      new_swap_id: "861014"
      new_counterparty: Issuer Group
      new_deadline: $(date -u -v+40d +%Y-%m-%dT%H:%M:%SZ)
      new_expiry:   $(date -u -v+80d +%Y-%m-%dT%H:%M:%SZ)
      idempotency_key: u3-roll-$(date +%s)
      expect_failure: true


  # ════════ U4 — FORFEIT AFTER REPURCHASE (terminal swap) → REJECT (unhappy) ════════
  # Once a repo is repurchased (COMPLETED), it cannot be forfeited — the collateral already returned.
  - name: u4_underlying
    type: create_obligation
    user: { id: payer@yieldfabric.com, password: payer_password, group: Payer Group }
    parameters: { idempotency_key: u4-under-$(date +%s), counterpart: Payer Group, expiry: $(date -u -v+90d +%Y-%m-%dT%H:%M:%SZ), contract_id: na_u4_underlying, data: { name: "U4 underlying", description: "forfeit-after-repurchase" } }
  - name: u4_create
    type: create_swap
    user: { id: payer@yieldfabric.com, password: payer_password, group: Payer Group }
    parameters:
      swap_id: "861005"
      idempotency_key: u4-create-$(date +%s)
      deadline: $(date -u -v+40d +%Y-%m-%dT%H:%M:%SZ)
      expiry:   $(date -u -v+80d +%Y-%m-%dT%H:%M:%SZ)
      initiator:
        collateral_obligation_ids: [na_u4_underlying]
