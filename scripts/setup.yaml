    password: originator_password
    role: SuperAdmin

  - id: collateral@yieldfabric.com # IQEQ
    password: collateral_password
    role: SuperAdmin

  - id: issuer@yieldfabric.com # PCT
    password: issuer_password
    role: SuperAdmin

  - id: investor@yieldfabric.com #BCV
    password: investor_password
